<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Consult</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .left-panel {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid #2a2a2a;
            padding: 16px 10px;
            gap: 10px;
            overflow-y: auto;
        }
        .left-panel h2 { font-size: 14px; font-weight: 500; color: #888; }
        .body-svg { width: 160px; cursor: default; }
        .bp {
            fill: #2a2a2a;
            stroke: #555;
            stroke-width: 1;
            cursor: pointer;
            transition: fill 0.2s, stroke 0.2s;
        }
        .bp:hover { fill: #1a4a7a; stroke: #378ADD; }
        .bp.sel { fill: #378ADD; stroke: #85B7EB; }
        .bp-label {
            font-size: 9px;
            fill: #888;
            pointer-events: none;
            text-anchor: middle;
            font-family: 'Segoe UI', sans-serif;
        }
        #status {
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        .divider { width: 100%; height: 1px; background: #2a2a2a; }
        .freetext-area { width: 100%; padding: 0 4px; }
        .freetext-area label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
        .freetext-area textarea {
            width: 100%;
            height: 68px;
            font-size: 12px;
            resize: none;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: #e0e0e0;
            padding: 7px 10px;
            font-family: inherit;
            outline: none;
        }
        .freetext-area textarea:focus { border-color: #378ADD; }
        .freetext-area button {
            margin-top: 6px;
            width: 100%;
            padding: 8px;
            font-size: 12px;
            font-weight: 500;
            background: #1a3a5c;
            color: #85B7EB;
            border: 1px solid #378ADD;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .freetext-area button:hover { background: #1e4a72; }
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
            background: #161616;
        }
        .right-panel h2 { font-size: 14px; font-weight: 500; color: #888; margin-bottom: 10px; }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
            padding-right: 4px;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .message {
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 85%;
            line-height: 1.55;
            font-size: 13.5px;
        }
        .bot-msg {
            background: #222;
            color: #ddd;
            align-self: flex-start;
            border-radius: 4px 14px 14px 14px;
        }
        .user-msg {
            background: #185FA5;
            color: #fff;
            align-self: flex-end;
            border-radius: 14px 4px 14px 14px;
        }
        .err-msg {
            background: #3a1a1a;
            color: #f88;
            align-self: flex-start;
            border-radius: 4px 14px 14px 14px;
            font-size: 12px;
        }
        .input-area { display: flex; gap: 8px; }
        .input-area input {
            flex: 1;
            padding: 11px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1e1e1e;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: #378ADD; }
        .input-area input:disabled { opacity: 0.4; }
        .input-area button {
            padding: 11px 18px;
            background: #185FA5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #1a6fc0; }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
        .thinking { opacity: 0.5; font-style: italic; }
    </style>
</head>
<body>

<div class="left-panel">
    <h2>Select pain area</h2>

    <svg class="body-svg" viewBox="0 0 160 340">
        <!-- Head -->
        <ellipse id="bp-head" class="bp" cx="80" cy="22" rx="20" ry="22" data-part="Head"/>
        <text class="bp-label" x="80" y="26">Head</text>

        <!-- Neck -->
        <rect id="bp-neck" class="bp" x="70" y="44" width="20" height="14" rx="3" data-part="Neck"/>
        <text class="bp-label" x="80" y="54">Neck</text>

        <!-- Left shoulder -->
        <ellipse id="bp-lshoulder" class="bp" cx="42" cy="66" rx="14" ry="10" data-part="Left shoulder"/>
        <text class="bp-label" x="42" y="70">L</text>

        <!-- Right shoulder -->
        <ellipse id="bp-rshoulder" class="bp" cx="118" cy="66" rx="14" ry="10" data-part="Right shoulder"/>
        <text class="bp-label" x="118" y="70">R</text>

        <!-- Chest -->
        <rect id="bp-chest" class="bp" x="56" y="58" width="48" height="30" rx="4" data-part="Chest"/>
        <text class="bp-label" x="80" y="76">Chest</text>

        <!-- Abdomen -->
        <rect id="bp-abdomen" class="bp" x="56" y="90" width="48" height="28" rx="4" data-part="Abdomen"/>
        <text class="bp-label" x="80" y="107">Abdomen</text>

        <!-- Lower abdomen -->
        <rect id="bp-pelvis" class="bp" x="56" y="120" width="48" height="22" rx="4" data-part="Lower abdomen"/>
        <text class="bp-label" x="80" y="134">Lower abd.</text>

        <!-- Left upper arm -->
        <rect id="bp-luarm" class="bp" x="24" y="76" width="16" height="40" rx="6" data-part="Left upper arm"/>

        <!-- Right upper arm -->
        <rect id="bp-ruarm" class="bp" x="120" y="76" width="16" height="40" rx="6" data-part="Right upper arm"/>

        <!-- Left elbow -->
        <ellipse id="bp-lelbow" class="bp" cx="32" cy="120" rx="10" ry="7" data-part="Left elbow"/>

        <!-- Right elbow -->
        <ellipse id="bp-relbow" class="bp" cx="128" cy="120" rx="10" ry="7" data-part="Right elbow"/>

        <!-- Left forearm -->
        <rect id="bp-lfarm" class="bp" x="24" y="128" width="16" height="34" rx="6" data-part="Left forearm"/>

        <!-- Right forearm -->
        <rect id="bp-rfarm" class="bp" x="120" y="128" width="16" height="34" rx="6" data-part="Right forearm"/>

        <!-- Left wrist/hand -->
        <ellipse id="bp-lhand" class="bp" cx="32" cy="170" rx="11" ry="8" data-part="Left wrist/hand"/>
        <text class="bp-label" x="10" y="173" style="text-anchor:start; font-size:8px;">Wrist</text>

        <!-- Right wrist/hand -->
        <ellipse id="bp-rhand" class="bp" cx="128" cy="170" rx="11" ry="8" data-part="Right wrist/hand"/>
        <text class="bp-label" x="141" y="173" style="text-anchor:start; font-size:8px;">Wrist</text>

        <!-- Left thigh -->
        <rect id="bp-lhip" class="bp" x="54" y="144" width="22" height="44" rx="6" data-part="Left hip/thigh"/>

        <!-- Right thigh -->
        <rect id="bp-rhip" class="bp" x="84" y="144" width="22" height="44" rx="6" data-part="Right hip/thigh"/>

        <!-- Left knee -->
        <ellipse id="bp-lknee" class="bp" cx="65" cy="193" rx="12" ry="8" data-part="Left knee"/>

        <!-- Right knee -->
        <ellipse id="bp-rknee" class="bp" cx="95" cy="193" rx="12" ry="8" data-part="Right knee"/>

        <!-- Left lower leg -->
        <rect id="bp-lleg" class="bp" x="55" y="203" width="20" height="48" rx="6" data-part="Left lower leg"/>

        <!-- Right lower leg -->
        <rect id="bp-rleg" class="bp" x="85" y="203" width="20" height="48" rx="6" data-part="Right lower leg"/>

        <!-- Left ankle/foot -->
        <ellipse id="bp-lankle" class="bp" cx="65" cy="257" rx="13" ry="8" data-part="Left ankle/foot"/>

        <!-- Right ankle/foot -->
        <ellipse id="bp-rankle" class="bp" cx="95" cy="257" rx="13" ry="8" data-part="Right ankle/foot"/>
    </svg>

    <p id="status">Tap a body part to begin</p>
    <div class="divider"></div>

    <div class="freetext-area">
        <label>Or describe symptoms directly</label>
        <textarea id="free-desc" placeholder="e.g. I have a fever of 101°F, chills and fatigue since yesterday..."></textarea>
        <button onclick="sendFreeText()">Describe symptoms ↗</button>
    </div>
</div>

<div class="right-panel">
    <h2>AI Consultation</h2>
    <div id="chat-box">
        <div class="message bot-msg">Hello! Tap a body part on the diagram, or describe your symptoms directly in the box on the left.</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Describe how it feels..." disabled/>
        <button id="send-btn" disabled>Send</button>
    </div>
</div>

<script>
    let selectedPart = "";
    let conversationHistory = [];

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    document.querySelectorAll('.bp').forEach(el => {
        el.addEventListener('click', function () {
            document.querySelectorAll('.bp').forEach(b => b.classList.remove('sel'));
            this.classList.add('sel');
            selectedPart = this.dataset.part;
            status.textContent = '✓ ' + selectedPart;
            conversationHistory = [];
            chatBox.innerHTML = `<div class="message bot-msg">You selected <b>${selectedPart}</b>. Please describe the pain — when did it start and what kind of pain is it?</div>`;
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        });
    });

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = 'message ' + type;
        div.innerHTML = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    function sendFreeText() {
        const desc = document.getElementById('free-desc').value.trim();
        if (!desc) return;
        selectedPart = "";
        conversationHistory = [];
        chatBox.innerHTML = '';
        addMessage(desc, 'user-msg');
        conversationHistory.push({ role: 'user', content: desc });
        document.getElementById('free-desc').value = '';
        userInput.disabled = false;
        sendBtn.disabled = false;
        callAPI();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;
        addMessage(text, 'user-msg');
        userInput.value = '';
        conversationHistory.push({ role: 'user', content: text });
        callAPI();
    }

    async function callAPI() {
        const thinking = addMessage('Thinking...', 'bot-msg thinking');
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bodyPart: selectedPart,
                    history: conversationHistory
                })
            });
            const data = await response.json();
            thinking.remove();
            if (!response.ok) {
                addMessage('<b>Error:</b> ' + (data.error || 'Unknown error'), 'err-msg');
                return;
            }
            addMessage(data.reply, 'bot-msg');
            conversationHistory.push({ role: 'assistant', content: data.reply });
        } catch (error) {
            thinking.remove();
            addMessage('<b>Connection error:</b> ' + error.message, 'err-msg');
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
